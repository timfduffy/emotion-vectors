# Tiny config for end-to-end testing.
prompt: "Write me a haiku."
system_prompt: ""
temperature: 0.0
max_tokens: 250
top_p: 1.0
scope: "assistant_only"
batch_size: 8
seed: 42

sources:
  emotions: ../emotion_vectors_denoised
  pca:      ../pca_vectors

vectors:
  - {source: pca,      name: pc1_valence}


strengths: [10, 5, 2, 0, -2, -5, -10]

layer_ranges:
  - [19, 24]
  - [14, 23]
  - [24, 33]
  - [0, 34]